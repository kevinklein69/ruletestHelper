<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassMarker Regeltest Helper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    header {
      background: #0f3460;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 15px;
      font-weight: bold;
    }

    .content {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-box {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-label { font-size: 12px; color: #7a9cc0; }
    .stat-value { font-size: 20px; font-weight: bold; color: #a0cfff; }

    .info {
      font-size: 12px;
      color: #7a9cc0;
      line-height: 1.5;
    }

    button {
      width: 100%;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      transition: background 0.2s;
    }

    button:hover { background: #0f3460; }

    #clear-btn {
      color: #ff6b6b;
      border-color: #6b1a1a;
      font-size: 12px;
    }

    #clear-btn:hover { background: #3d0000; }

    .divider {
      height: 1px;
      background: #0f3460;
    }

    #status {
      font-size: 12px;
      color: #a0cfff;
      min-height: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <span style="font-size:22px">🏒</span>
    <h1>Eishockey Regeltest Helper</h1>
  </header>

  <div class="content">
    <div class="stat-box">
      <span class="stat-label">Gespeicherte Fragen</span>
      <span class="stat-value" id="count">–</span>
    </div>

    <p class="info">
      Mache den Test, sieh dir die Ergebnisse an — die richtigen Antworten werden automatisch gespeichert. Beim nächsten Durchlauf wird alles automatisch ausgefüllt.
    </p>

    <div class="divider"></div>

    <div id="status"></div>

    <button id="clear-btn">🗑 Alle gespeicherten Antworten löschen</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
